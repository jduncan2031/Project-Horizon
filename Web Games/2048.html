<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        body {
            background-color: #121212; color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .header { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: #333; padding: 10px 20px; border-radius: 6px; text-align: center; min-width: 80px; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #aaa; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        
        .grid-container {
            position: relative; width: 440px; height: 440px;
            background: #1e1e1e; border-radius: 8px; padding: 10px;
        }
        .grid-cell { position: absolute; width: 100px; height: 100px; background: #2c2c2c; border-radius: 4px; }
        .tile {
            position: absolute; width: 100px; height: 100px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: bold; z-index: 10;
            transition: transform 0.1s ease-in-out; top: 0; left: 0;
        }
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); border-radius: 8px; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #game-over h1 { font-size: 48px; margin-bottom: 20px; }
        #restart-btn {
            background: #edc22e; color: #333; border: none; padding: 15px 30px;
            font-size: 20px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }

        /* Tile Colors */
        .tile-2 { background: #3d3d3d; color: #eee; }
        .tile-4 { background: #4a4a4a; color: #eee; }
        .tile-8 { background: #f2b179; color: #333; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; font-size: 30px; }
        .tile-2048 { background: #edc22e; font-size: 25px; box-shadow: 0 0 25px #edc22e; }
    </style>
</head>
<body>
    <div class="header">
        <div class="stat-box"><div class="stat-label">Score</div><div id="score" class="stat-value">0</div></div>
        <div class="stat-box"><div class="stat-label">Best</div><div id="best" class="stat-value">0</div></div>
    </div>
    <div class="grid-container" id="grid-container">
        <div id="game-over">
            <h1>Game Over!</h1>
            <button id="restart-btn" onclick="restartGame()">Try Again</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('grid-container');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gameOverEl = document.getElementById('game-over');
        let board = Array(16).fill(null);
        let score = 0;
        let bestScore = localStorage.getItem('2048-best') || 0;
        bestEl.innerText = bestScore;

        function getPos(idx) { return { x: (idx % 4) * 110 + 10, y: Math.floor(idx / 4) * 110 + 10 }; }

        function init() {
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                const pos = getPos(i);
                cell.style.top = `${pos.y}px`; cell.style.left = `${pos.x}px`;
                container.appendChild(cell);
            }
            addTile(); addTile();
        }

        function addTile() {
            let empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (empty.length === 0) return;
            let idx = empty[Math.floor(Math.random() * empty.length)];
            let val = Math.random() < 0.9 ? 2 : 4;
            let tile = document.createElement('div');
            tile.className = `tile tile-${val}`;
            tile.innerText = val;
            const pos = getPos(idx);
            tile.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(0)`;
            container.appendChild(tile);
            setTimeout(() => tile.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`, 50);
            board[idx] = { val, element: tile };
            checkGameOver();
        }

        function move(dir) {
            let moved = false;
            // Map arrow keys and WASD to directions
            const isUp = ['w', 'arrowup'].includes(dir);
            const isDown = ['s', 'arrowdown'].includes(dir);
            const isLeft = ['a', 'arrowleft'].includes(dir);
            const isRight = ['d', 'arrowright'].includes(dir);

            const isVert = isUp || isDown;
            const isRev = isDown || isRight;

            for (let i = 0; i < 4; i++) {
                let rowIndices = [];
                for (let j = 0; j < 4; j++) rowIndices.push(isVert ? j * 4 + i : i * 4 + j);
                if (isRev) rowIndices.reverse();

                let tiles = rowIndices.map(idx => ({idx, data: board[idx]})).filter(item => item.data !== null);
                
                for (let j = 0; j < tiles.length; j++) {
                    let current = tiles[j];
                    let targetIdx = rowIndices[j];

                    if (tiles[j+1] && current.data.val === tiles[j+1].data.val) {
                        let next = tiles[j+1];
                        score += (current.data.val *= 2);
                        next.data.element.style.transform = `translate(${getPos(targetIdx).x}px, ${getPos(targetIdx).y}px) scale(0)`;
                        setTimeout(() => next.data.element.remove(), 100);
                        board[next.idx] = null;
                        tiles.splice(j + 1, 1);
                        moved = true;
                    }
                    if (current.idx !== targetIdx) {
                        board[current.idx] = null;
                        board[targetIdx] = current.data;
                        moved = true;
                    }
                    const pos = getPos(targetIdx);
                    current.data.element.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
                    current.data.element.className = `tile tile-${current.data.val}`;
                    current.data.element.innerText = current.data.val;
                }
            }
            if (moved) {
                setTimeout(addTile, 120);
                scoreEl.innerText = score;
                if (score > bestScore) {
                    bestScore = score;
                    bestEl.innerText = bestScore;
                    localStorage.setItem('2048-best', bestScore);
                }
            }
        }

        function checkGameOver() {
            const hasEmpty = board.some(v => v === null);
            if (hasEmpty) return;
            for (let i = 0; i < 16; i++) {
                const val = board[i].val;
                if ((i % 4 < 3 && board[i+1]?.val === val) || (i < 12 && board[i+4]?.val === val)) return;
            }
            gameOverEl.style.display = 'flex';
        }

        function restartGame() {
            board.forEach(tile => tile && tile.element.remove());
            board = Array(16).fill(null);
            score = 0; scoreEl.innerText = 0;
            gameOverEl.style.display = 'none';
            addTile(); addTile();
        }

        // Event listener for both WASD and Arrows
        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            const validKeys = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'];
            if (validKeys.includes(key)) {
                e.preventDefault(); // Stop page from scrolling
                move(key);
            }
        });

        init();
    </script>
</body>
</html>
