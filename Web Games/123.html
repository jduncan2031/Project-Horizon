<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dashers Fullscreen</title>
    <style>
        /* Reset margins and eliminate window scrollbars */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: Arial, sans-serif;
        }

        /* Container to scale the game cleanly */
        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Iframe loading the unblocked production branch game source */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Pulls directly from the web-dashers deployment pipeline -->
        <iframe 
            src="https://rawcdn.githack.com/web-dashers/web-dashers.github.io/refs/heads/main/index.html" 
            allow="autoplay; keyboard; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-forms allow-modals">
        </iframe>
    </div>

</body>
</html>
